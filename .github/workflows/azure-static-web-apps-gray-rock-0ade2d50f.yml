name: FlairTech Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          npm install -g bun
          bun install
          bun run build

      - name: Build Backend
        working-directory: ./backend
        run: |
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r backend/dist deploy/dist
          cp -r dist/client deploy/public
          cp backend/package.json deploy/package.json

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: flairtechsolutions-api
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./deploy
