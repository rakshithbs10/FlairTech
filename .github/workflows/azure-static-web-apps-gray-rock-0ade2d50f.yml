name: FlairTech Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_frontend:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install Bun and Build
        working-directory: ./crafted-click-code-main
        run: |
          npm install -g bun
          bun install
          bun run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r ./crafted-click-code-main/dist deploy/dist
          cp ./crafted-click-code-main/package.json deploy/package.json
          echo "node dist/server/server.js" > deploy/startup.sh

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: flairtechsolutions-web
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy
